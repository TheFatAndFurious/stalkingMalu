services:
  emqx:
    image: emqx/emqx:latest        # épingle une version précise (ex. emqx/emqx:6.2.x) pour la repro
    container_name: emqx
    hostname: emqx                  # nom de nœud stable → évite les soucis au redémarrage
    restart: unless-stopped
    ports:
      - "1883:1883"     # MQTT — l'agent se connecte ici
      - "8083:8083"     # MQTT over WebSocket
      - "8883:8883"     # MQTT over TLS (pour plus tard)
      - "8084:8084"     # WSS (pour plus tard)
      - "18083:18083"   # Dashboard → http://localhost:18083  (admin / public)
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  emqx-data:
  emqx-log: